<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBBI Sambung Kata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div class="logo">kbbi<em>.</em>sk</div>
  <div class="badge">sambung kata tool</div>
</header>

<main>
  <div class="hero">
    <h1>Cari kata by<br><mark>awalan & akhiran</mark></h1>
    <p>// offline · 115k+ kata · klik untuk copy</p>
  </div>

  <div class="tips">
    <span>💡 tips</span>
    Kasih kata berakhiran huruf langka — X, Z, Q, Y — biar lawan kesulitan.
  </div>

  <div class="search-box">
    <div class="search-grid">
      <div class="field">
        <label>Awalan</label>
        <input type="text" id="inputPrefix" placeholder="me, per, ber..." maxlength="20" />
      </div>
      <div class="field">
        <label>Akhiran</label>
        <input type="text" id="inputSuffix" placeholder="an, kan, i..." maxlength="20" />
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="doSearch()">Cari</button>
      <button class="btn btn-ghost" onclick="doReset()">Reset</button>
    </div>
  </div>

  <div id="statsBar" class="stats" style="display:none"></div>
  <div id="resultsLabel" class="results-label" style="display:none"></div>
  <div id="output"></div>
  <div id="pagination" class="pagination"></div>
</main>

<div id="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
