<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBBI — Sambung Kata</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div class="logo">KBBI<span>.</span>SK</div>
  <div class="badge">⚡ Sambung Kata Tool</div>
</header>

<main>
  <div class="tagline">Cari kata<br><span class="highlight">awalan & akhiran</span></div>
  <div class="sub">// database offline · 115k+ kata · klik kata untuk copy</div>

  <div class="tips">
    <strong>💡 Tips Sambung Kata</strong>
    Kasih kata yang berakhiran huruf langka: <b>X, Z, Q, Y</b> biar lawan kesulitan.
  </div>

  <div class="search-box">
    <div class="search-row">
      <div class="input-group">
        <label>Awalan</label>
        <input type="text" id="inputPrefix" placeholder="me, per, ber..." maxlength="20" />
      </div>
      <div class="input-group">
        <label>Akhiran</label>
        <input type="text" id="inputSuffix" placeholder="an, kan, i..." maxlength="20" />
      </div>
      <div class="input-group">
        <label>Min huruf</label>
        <input type="number" id="inputMin" placeholder="0" min="1" max="30" />
      </div>
      <div class="input-group">
        <label>Max huruf</label>
        <input type="number" id="inputMax" placeholder="∞" min="1" max="30" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="doSearch()">🔍 CARI</button>
      <button class="btn btn-secondary" onclick="doReset()">✕ RESET</button>
      <button class="btn btn-danger" onclick="doRandom()">🎲 RANDOM LANGKA</button>
    </div>
  </div>

  <div id="statsBar" class="stats-bar" style="display:none"></div>
  <div id="resultsHeader" class="results-header" style="display:none"></div>
  <div id="output"></div>
  <div id="pagination" class="pagination"></div>
</main>

<div id="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
